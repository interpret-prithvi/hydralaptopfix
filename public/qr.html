<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connect with Hydra Laptop Fix — Professional laptop and Hydra machine repair in Bengaluru." />
  <meta name="theme-color" content="#06b6d4" />
  <title>Hydra Laptop Fix — Connect With Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f9ff;
      --card-bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --shadow: 0 20px 60px rgba(6,182,212,0.12), 0 4px 16px rgba(0,0,0,0.08);
      --radius: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --shadow: 0 20px 60px rgba(6,182,212,0.15), 0 4px 16px rgba(0,0,0,0.4);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(6,182,212,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 60%);
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-img {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      object-fit: contain;
      background: white;
      padding: 4px;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(6,182,212,0.2);
      border: 2px solid rgba(6,182,212,0.15);
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .logo-tagline {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 5px;
      text-align: center;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(6,182,212,0.3), transparent);
      margin: 0 0 24px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
    .btn:active { transform: scale(0.97); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    .btn-whatsapp { background: linear-gradient(135deg, #25d366, #16a34a); box-shadow: 0 4px 16px rgba(37,211,102,0.3); }
    .btn-website  { background: linear-gradient(135deg, #0ea5e9, #2563eb); box-shadow: 0 4px 16px rgba(14,165,233,0.3); }
    .btn-email    { background: linear-gradient(135deg, #8b5cf6, #6366f1); box-shadow: 0 4px 16px rgba(139,92,246,0.3); }
    .btn-icon     { font-size: 18px; }

    /* QR Section */
    .qr-section {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .qr-wrap {
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border: 1.5px solid rgba(6,182,212,0.15);
    }

    #qrcode canvas, #qrcode img { display: block; border-radius: 4px; }

    .qr-hint {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Footer */
    .footer-info {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .footer-info a { color: #0ea5e9; text-decoration: none; font-weight: 500; }
    .footer-info a:hover { text-decoration: underline; }

    /* Floating WhatsApp FAB */
    .fab {
      position: fixed;
      bottom: 22px;
      right: 18px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #25d366, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.5);
      animation: fabPulse 2s ease-in-out infinite;
      transition: transform 0.2s ease;
      z-index: 100;
    }
    .fab:hover { transform: scale(1.1); }
    .fab svg { width: 24px; height: 24px; fill: white; }

    @keyframes fabPulse {
      0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.5); }
      50%      { box-shadow: 0 4px 32px rgba(37,211,102,0.8); }
    }
  </style>
</head>
<body>

  <main class="card" role="main">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="/s4-logo.jpg" alt="Hydra Laptop Fix Logo" class="logo-img" />
      <div class="logo-name">Hydra Laptop Fix</div>
      <p class="logo-tagline">Choose how you'd like to connect with us.</p>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- Action Buttons -->
    <nav class="btn-group" aria-label="Contact options">
      <a href="https://wa.me/918050461118" class="btn btn-whatsapp"
         target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <span class="btn-icon" aria-hidden="true">💬</span>
        Chat on WhatsApp
      </a>
      <a href="https://hydralaptopfix.com/" class="btn btn-website"
         target="_blank" rel="noopener noreferrer" aria-label="Visit our website">
        <span class="btn-icon" aria-hidden="true">🌐</span>
        Visit Website
      </a>
      <a href="mailto:info@hydralaptopfix.com" class="btn btn-email" aria-label="Send us an email">
        <span class="btn-icon" aria-hidden="true">✉️</span>
        Email Us
      </a>
    </nav>

    <!-- QR Code -->
    <div class="qr-section">
      <div class="qr-label">Scan to share this page</div>
      <div class="qr-wrap">
        <div id="qrcode"></div>
      </div>
      <div class="qr-hint">interpret-prithvi.github.io/hydralaptopfix/qr.html</div>
    </div>

    <!-- Footer -->
    <div class="footer-info">
      <div>📞 <a href="tel:+918050461118">+91 8050461118</a></div>
      <div>Bengaluru, Karnataka</div>
      <div><a href="https://hydralaptopfix.com/" target="_blank" rel="noopener noreferrer">hydralaptopfix.com</a></div>
    </div>
  </main>

  <!-- Floating WhatsApp FAB -->
  <a href="https://wa.me/918050461118" class="fab" target="_blank"
     rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <script>
    // Generate QR code pointing to the live page
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://interpret-prithvi.github.io/hydralaptopfix/qr.html',
      width: 160,
      height: 160,
      colorDark: '#0f172a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // Ripple effect
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });
  </script>
</body>
</html>
